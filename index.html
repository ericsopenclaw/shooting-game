<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Star Assault</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    touch-action: none;
  }
  #gameCanvas {
    display: block;
    image-rendering: pixelated;
    cursor: crosshair;
    touch-action: none;
  }
  #ui {
    position: fixed;
    top: 0; left: 0; right: 0;
    padding: 10px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    pointer-events: none;
    z-index: 10;
  }
  .ui-block { color: #fff; font-size: 14px; text-shadow: 0 0 8px #0af; }
  #scoreDisplay { font-size: 20px; color: #0ff; text-shadow: 0 0 12px #0ff; }
  #waveDisplay { color: #fa0; text-shadow: 0 0 8px #fa0; }
  #healthBar {
    display: flex; gap: 4px; align-items: center;
  }
  .heart { font-size: 18px; }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="ui">
  <div class="ui-block" id="scoreDisplay">SCORE: 0</div>
  <div class="ui-block" id="waveDisplay">WAVE 1</div>
  <div class="ui-block" id="healthBar"></div>
</div>

<script>
// ─── CANVAS SETUP ─────────────────────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let W, H, SCALE;

function resize() {
  const size = Math.min(window.innerWidth, window.innerHeight, 540);
  W = canvas.width = size;
  H = canvas.height = Math.min(window.innerHeight, size * 1.4);
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  SCALE = W / 360;
}
resize();
window.addEventListener('resize', resize);

// ─── AUDIO ────────────────────────────────────────────────────────────────────
let audioCtx;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playSound(type) {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  const t = audioCtx.currentTime;
  if (type === 'shoot') {
    o.frequency.setValueAtTime(880, t);
    o.frequency.exponentialRampToValueAtTime(220, t + 0.08);
    g.gain.setValueAtTime(0.15, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
    o.start(t); o.stop(t + 0.08);
  } else if (type === 'enemyDie') {
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(440, t);
    o.frequency.exponentialRampToValueAtTime(55, t + 0.18);
    g.gain.setValueAtTime(0.2, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
    o.start(t); o.stop(t + 0.18);
  } else if (type === 'playerHit') {
    o.type = 'square';
    o.frequency.setValueAtTime(200, t);
    o.frequency.exponentialRampToValueAtTime(60, t + 0.3);
    g.gain.setValueAtTime(0.3, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    o.start(t); o.stop(t + 0.3);
  } else if (type === 'gameover') {
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(220, t);
    o.frequency.exponentialRampToValueAtTime(30, t + 1.2);
    g.gain.setValueAtTime(0.35, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 1.2);
    o.start(t); o.stop(t + 1.2);
  } else if (type === 'levelup') {
    o.type = 'triangle';
    o.frequency.setValueAtTime(440, t);
    o.frequency.setValueAtTime(660, t + 0.1);
    o.frequency.setValueAtTime(880, t + 0.2);
    g.gain.setValueAtTime(0.25, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
    o.start(t); o.stop(t + 0.4);
  } else if (type === 'boss') {
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(110, t);
    o.frequency.setValueAtTime(90, t + 0.2);
    o.frequency.setValueAtTime(110, t + 0.4);
    g.gain.setValueAtTime(0.3, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
    o.start(t); o.stop(t + 0.5);
  }
}

// ─── STARS (BACKGROUND) ───────────────────────────────────────────────────────
const stars = Array.from({length: 120}, () => ({
  x: Math.random(), y: Math.random(),
  s: Math.random() * 1.8 + 0.3,
  sp: Math.random() * 0.4 + 0.1
}));

function drawStars() {
  ctx.fillStyle = '#000010';
  ctx.fillRect(0, 0, W, H);
  for (const s of stars) {
    s.y += s.sp * 0.003;
    if (s.y > 1) s.y = 0;
    const brightness = 0.4 + s.sp * 0.6;
    ctx.fillStyle = `rgba(200,220,255,${brightness})`;
    ctx.fillRect(s.x * W, s.y * H, s.s, s.s);
  }
}

// ─── PARTICLES ────────────────────────────────────────────────────────────────
const particles = [];
function spawnParticles(x, y, color, count = 12, speed = 3) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = Math.random() * speed + 0.5;
    particles.push({
      x, y,
      vx: Math.cos(a) * sp,
      vy: Math.sin(a) * sp,
      life: 1,
      decay: Math.random() * 0.04 + 0.02,
      size: Math.random() * 4 + 1,
      color
    });
  }
}
// ─── POWERUPS ────────────────────────────────────────────────────────────────
function updatePowerups() {
  for (let i = powerups.length - 1; i >= 0; i--) {
    const p = powerups[i];
    p.y += p.vy;
    p.life--;
    if (p.life <= 0) powerups.splice(i, 1);
  }
  // Laser energy regen
  if (currentWeapon !== 'laser') {
    laserEnergy = Math.min(laserMax, laserEnergy + laserRegenRate);
  }
}

function drawPowerups() {
  for (const p of powerups) {
    const blink = Math.sin(p.life * 0.3) > 0;
    if (!blink) continue;
    ctx.save();
    ctx.shadowBlur = 16;
    const colors = { spread: '#ff0', laser: '#0f8', missile: '#f80', radial: '#f0f' };
    const labels = { spread: 'S', laser: 'L', missile: 'M', radial: 'R' };
    ctx.shadowColor = colors[p.type];
    ctx.fillStyle = colors[p.type];
    ctx.beginPath();
    ctx.arc(p.x, p.y, 10, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#000';
    ctx.font = 'bold 11px Courier New';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(labels[p.type], p.x, p.y);
    ctx.restore();
  }
}

// ─── PARTICLES ────────────────────────────────────────────────────────────────
function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.95; p.vy *= 0.95;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}
function drawParticles() {
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.shadowBlur = 6;
    ctx.shadowColor = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// ─── SCREEN SHAKE ─────────────────────────────────────────────────────────────
let shakeAmt = 0;
let shakeX = 0, shakeY = 0;
function shake(amount) { shakeAmt = Math.max(shakeAmt, amount); }
function applyShake() {
  if (shakeAmt > 0.3) {
    shakeX = (Math.random() - 0.5) * shakeAmt;
    shakeY = (Math.random() - 0.5) * shakeAmt;
    shakeAmt *= 0.8;
    ctx.translate(shakeX, shakeY);
  } else {
    shakeAmt = 0;
  }
}

// ─── GAME STATE ───────────────────────────────────────────────────────────────
let state = 'title'; // title | playing | gameover
let score = 0;
let wave = 1;
let enemiesLeft = 0;
let spawnTimer = 0;
let spawnInterval = 75;
let spawnCount = 0;
let waveTotal = 5;
let waveTransition = 0;
let highScore = parseInt(localStorage.getItem('starAssaultHigh') || '0');

// ─── PLAYER ───────────────────────────────────────────────────────────────────
const player = {
  x: 0, y: 0, w: 28, h: 32,
  vx: 0, vy: 0,
  lives: 3, maxLives: 3,
  invincible: 0,
  shootCooldown: 0,
  shootDelay: 14,
  thrusterAnim: 0,
  moving: false
};

function resetPlayer() {
  player.x = W / 2;
  player.y = H - 80 * SCALE;
  player.vx = 0; player.vy = 0;
  player.invincible = 0;
  player.shootCooldown = 0;
}

function drawPlayer() {
  if (player.invincible > 0 && Math.floor(player.invincible / 4) % 2 === 0) return;
  const x = player.x, y = player.y;
  const s = SCALE;
  player.thrusterAnim = (player.thrusterAnim + 0.25) % (Math.PI * 2);

  ctx.save();
  // Thruster glow
  const thrLen = 10 + Math.sin(player.thrusterAnim) * 5;
  const thrGrad = ctx.createLinearGradient(x, y + 12, x, y + 12 + thrLen * s);
  thrGrad.addColorStop(0, 'rgba(0,200,255,0.8)');
  thrGrad.addColorStop(1, 'rgba(0,100,255,0)');
  ctx.fillStyle = thrGrad;
  ctx.beginPath();
  ctx.moveTo(x - 7 * s, y + 10 * s);
  ctx.lineTo(x + 7 * s, y + 10 * s);
  ctx.lineTo(x, y + (12 + thrLen) * s);
  ctx.fill();

  // Ship body
  ctx.shadowBlur = 12;
  ctx.shadowColor = '#0af';
  ctx.fillStyle = '#1af';
  ctx.beginPath();
  ctx.moveTo(x, y - 16 * s);
  ctx.lineTo(x - 12 * s, y + 12 * s);
  ctx.lineTo(x - 6 * s, y + 6 * s);
  ctx.lineTo(x, y + 10 * s);
  ctx.lineTo(x + 6 * s, y + 6 * s);
  ctx.lineTo(x + 12 * s, y + 12 * s);
  ctx.closePath();
  ctx.fill();

  // Wing accents
  ctx.fillStyle = '#fff';
  ctx.shadowBlur = 4;
  ctx.shadowColor = '#fff';
  ctx.beginPath();
  ctx.moveTo(x, y - 12 * s);
  ctx.lineTo(x - 3 * s, y - 4 * s);
  ctx.lineTo(x + 3 * s, y - 4 * s);
  ctx.fill();

  ctx.restore();
}

// ─── WEAPONS ─────────────────────────────────────────────────────────────────
let currentWeapon = 'normal'; // 'normal' | 'spread' | 'laser' | 'missile' | 'radial'
let laserEnergy = 100;
let laserMax = 100;
let laserRegenRate = 0.4;
let missileCount = 0;
let hasRadial = false;
let spreadPickups = 0;

// Weapon levels (0=max level achieved, use level() to check)
let spreadLevel = 0;    // max 5
let laserLevel = 0;     // max 3
let radialLevel = 0;    // max 5
const powerups = [];

function switchWeapon(w) {
  if (w === 'spread' && spreadPickups < 5) return;
  if (w === 'laser' && laserEnergy < 10) return;
  if (w === 'radial' && !hasRadial) return;
  currentWeapon = w;
}

function spawnPowerup(x, y) {
  const types = ['spread', 'laser', 'missile', 'radial'];
  const t = types[Math.floor(Math.random() * types.length)];
  powerups.push({ x, y, type: t, life: 300, vy: 0.8 });
}

function shoot() {
  if (player.shootCooldown > 0 && currentWeapon !== 'laser') return;
  if (currentWeapon === 'laser') {
    if (laserEnergy < 0.5) { currentWeapon = 'normal'; return; }
    const laserW = 6 + laserLevel * 4;
    const laserDmg = 0.3 + laserLevel * 0.2;
    const laserDrain = 1.5 + laserLevel * 0.5;
    laserEnergy -= laserDrain;
    for (const e of enemies) {
      if (Math.abs(e.x - player.x) < (e.w / 2 + laserW + 4)) {
        e.hp -= laserDmg;
        e.hitFlash = 3;
        spawnParticles(e.x, player.y - 20 * SCALE, '#0f8', 1, 1);
        if (e.hp <= 0) {
          score += e.pts * wave;
          spawnParticles(e.x, e.y, e.color, e.type === 'boss' ? 40 : 14, 5);
          shake(e.type === 'boss' ? 18 : 6);
          playSound('enemyDie');
          e.alive = false;
          enemiesLeft = Math.max(0, enemiesLeft - 1);
        }
      }
    }
    player.shootCooldown = 2;
    return;
  }
  if (currentWeapon === 'missile') {
    if (missileCount <= 0) { currentWeapon = 'normal'; return; }
    missileCount--;
    bullets.push({ x: player.x, y: player.y - 16 * SCALE, vy: -5 * SCALE, w: 8, h: 8, type: 'missile' });
    player.shootCooldown = 20;
    playSound('shoot');
    return;
  }
  if (currentWeapon === 'radial') {
    // Fire bullets in a circle, count increases with level
    const count = 8 + radialLevel * 4;
    for (let i = 0; i < count; i++) {
      const angle = (Math.PI * 2 * i) / count - Math.PI / 2;
      const spd = (8 + radialLevel) * SCALE;
      bullets.push({
        x: player.x,
        y: player.y - 10 * SCALE,
        vx: Math.cos(angle) * spd,
        vy: Math.sin(angle) * spd,
        w: 4, h: 4,
        type: 'radial'
      });
    }
    player.shootCooldown = Math.max(10, 25 - radialLevel * 4);
    playSound('shoot');
    return;
  }
  bullets.push({ x: player.x, y: player.y - 16 * SCALE, vy: -10 * SCALE, w: 3, h: 12, type: 'normal' });
  if (currentWeapon === 'spread' || wave >= 4) {
    const count = spreadLevel > 0 ? 2 + spreadLevel * 2 : (wave >= 4 ? 2 : 0);
    const spread = 0.15 + spreadLevel * 0.08;
    for (let i = 0; i < count; i++) {
      const angle = -Math.PI / 2 + (i - (count - 1) / 2) * spread;
      bullets.push({
        x: player.x, y: player.y - 12 * SCALE,
        vx: Math.cos(angle) * 9 * SCALE,
        vy: Math.sin(angle) * 9 * SCALE,
        w: 3, h: 10, type: 'spread'
      });
    }
  }
  player.shootCooldown = currentWeapon === 'spread' ? Math.max(4, 10 - spreadLevel * 1.5) : (player.shootDelay - Math.min(wave * 1.5, 8));
  playSound('shoot');
}

// ─── BULLETS ──────────────────────────────────────────────────────────────────
const bullets = [];
const enemyBullets = [];

function drawBullets() {
  ctx.save();
  for (const b of bullets) {
    if (b.type === 'laser') {
      ctx.shadowBlur = 20;
      ctx.shadowColor = '#0f8';
      const grad = ctx.createLinearGradient(b.x, b.y, b.x, b.y + b.h);
      grad.addColorStop(0, '#fff');
      grad.addColorStop(0.3, '#0f8');
      grad.addColorStop(1, 'rgba(0,255,128,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(b.x - b.w / 2, b.y, b.w, b.h);
    } else if (b.type === 'missile') {
      ctx.shadowBlur = 12;
      ctx.shadowColor = '#f80';
      ctx.fillStyle = '#f80';
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.w / 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ff0';
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.w / 4, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.shadowBlur = 10;
      ctx.shadowColor = b.type === 'spread' || b.type === 'radial' ? '#ff0' : '#0ff';
      ctx.fillStyle = b.type === 'spread' || b.type === 'radial' ? '#ff0' : '#0ff';
      ctx.fillRect(b.x - b.w / 2, b.y - b.h / 2, b.w, b.h);
    }
  }
  ctx.shadowBlur = 8;
  ctx.shadowColor = '#f80';
  ctx.fillStyle = '#f80';
  for (const b of enemyBullets) {
    ctx.beginPath();
    ctx.arc(b.x, b.y, 4, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

// ─── ENEMIES ──────────────────────────────────────────────────────────────────
const enemies = [];
const ENEMY_TYPES = {
  grunt: { hp: 1, pts: 10, color: '#f44', glow: '#f00', w: 24, h: 20, speed: 1.44, shootable: false },
  shooter: { hp: 2, pts: 25, color: '#f90', glow: '#f80', w: 26, h: 22, speed: 1.08, shootable: true },
  tank: { hp: 5, pts: 60, color: '#a0f', glow: '#80f', w: 32, h: 28, speed: 0.72, shootable: false },
  fast: { hp: 1, pts: 20, color: '#0f8', glow: '#0f0', w: 18, h: 16, speed: 3.0, shootable: false },
  boss: { hp: 39, pts: 500, color: '#f0a', glow: '#f0f', w: 56, h: 48, speed: 0.6, shootable: true }
};

function spawnEnemy(type, x) {
  const t = ENEMY_TYPES[type];
  const e = {
    type,
    x: x ?? (Math.random() * (W - 60) + 30),
    y: -30,
    w: t.w * SCALE, h: t.h * SCALE,
    hp: t.hp + Math.floor((wave - 1) * 0.5),
    maxHp: t.hp + Math.floor((wave - 1) * 0.5),
    pts: t.pts,
    color: t.color, glow: t.glow,
    speed: t.speed * SCALE * (1 + (wave - 1) * 0.08),
    shootable: t.shootable,
    shootTimer: Math.random() * 80 + 40,
    phase: Math.random() * Math.PI * 2,
    phaseSpeed: (Math.random() - 0.5) * 0.03,
    hitFlash: 0,
    alive: true
  };
  if (type === 'boss') {
    e.x = W / 2;
    e.y = -80;
  }
  enemies.push(e);
}

let bossSpawned = false;

function spawnWave() {
  bossSpawned = false;
  let types, count;
  if (wave % 5 === 0) {
    // Boss wave
    count = 1;
    spawnEnemy('boss', W / 2);
    bossSpawned = true;
    enemiesLeft = 1;
    waveTotal = 1;
    spawnCount = 1;
    return;
  }
  count = 6 + Math.floor(wave * 2.5);
  waveTotal = count;
  enemiesLeft = count;
  spawnCount = 0;
  spawnTimer = 0;
  const available = ['grunt'];
  if (wave >= 2) available.push('fast');
  if (wave >= 3) available.push('shooter');
  if (wave >= 4) available.push('tank');
}

function updateEnemies() {
  if (!bossSpawned && spawnCount < waveTotal) {
    spawnTimer--;
    if (spawnTimer <= 0) {
      const pool = ['grunt'];
      if (wave >= 2) pool.push('fast');
      if (wave >= 3) pool.push('shooter');
      if (wave >= 4) pool.push('tank');
      const weights = [0.45, 0.25, 0.2, 0.1];
      let r = Math.random(), chosen = pool[0];
      for (let i = 0; i < pool.length; i++) {
        r -= (weights[i] || 0.2);
        if (r <= 0) { chosen = pool[i]; break; }
      }
      spawnEnemy(chosen);
      spawnCount++;
      spawnTimer = spawnInterval - Math.min(wave * 5, 50);
    }
  }

  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    if (!e.alive) { enemies.splice(i, 1); continue; }

    if (e.hitFlash > 0) e.hitFlash--;

    // Movement
    if (e.type === 'boss') {
      e.phase += 0.02;
      e.x = W / 2 + Math.sin(e.phase) * (W * 0.3);
      e.y += (120 - e.y) * 0.02;
    } else {
      e.phase += e.phaseSpeed;
      e.x += Math.sin(e.phase) * 1.2;
      e.y += e.speed;
    }

    // Enemy shooting
    if (e.shootable) {
      e.shootTimer--;
      if (e.shootTimer <= 0) {
        const dx = player.x - e.x, dy = player.y - e.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const spd = 3.5 * SCALE;
        enemyBullets.push({ x: e.x, y: e.y + e.h / 2, vx: dx / dist * spd, vy: dy / dist * spd });
        e.shootTimer = (e.type === 'boss' ? 21 : 60) - Math.min(wave * 3, 30);
        if (e.type === 'boss') playSound('boss');
      }
    }

    // Out of bounds
    if (e.y > H + 60) {
      enemies.splice(i, 1);
      enemiesLeft = Math.max(0, enemiesLeft - 1);
    }
  }
}

function drawEnemies() {
  for (const e of enemies) {
    ctx.save();
    if (e.hitFlash > 0) {
      ctx.filter = 'brightness(3)';
    }
    ctx.shadowBlur = 14;
    ctx.shadowColor = e.glow;

    if (e.type === 'boss') {
      drawBoss(e);
    } else {
      drawEnemyShape(e);
    }

    // HP bar for tanky enemies
    if ((e.type === 'tank' || e.type === 'boss') && e.maxHp > 1) {
      const bw = e.w; const bh = 4;
      const bx = e.x - bw / 2; const by = e.y - e.h / 2 - 8;
      ctx.fillStyle = '#333';
      ctx.fillRect(bx, by, bw, bh);
      const pct = e.hp / e.maxHp;
      ctx.fillStyle = pct > 0.5 ? '#0f0' : pct > 0.25 ? '#ff0' : '#f00';
      ctx.fillRect(bx, by, bw * pct, bh);
    }
    ctx.restore();
  }
}

function drawEnemyShape(e) {
  ctx.fillStyle = e.hitFlash > 0 ? '#fff' : e.color;
  const x = e.x, y = e.y, w = e.w, h = e.h;

  if (e.type === 'grunt') {
    // Inverted ship
    ctx.beginPath();
    ctx.moveTo(x, y + h / 2);
    ctx.lineTo(x - w / 2, y - h / 2);
    ctx.lineTo(x - w / 6, y - h / 8);
    ctx.lineTo(x, y - h / 4);
    ctx.lineTo(x + w / 6, y - h / 8);
    ctx.lineTo(x + w / 2, y - h / 2);
    ctx.closePath();
    ctx.fill();
  } else if (e.type === 'shooter') {
    ctx.beginPath();
    ctx.moveTo(x, y + h / 2);
    ctx.lineTo(x - w / 2, y);
    ctx.lineTo(x - w / 3, y - h / 2);
    ctx.lineTo(x + w / 3, y - h / 2);
    ctx.lineTo(x + w / 2, y);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#fff3';
    ctx.beginPath();
    ctx.arc(x, y, w / 6, 0, Math.PI * 2);
    ctx.fill();
  } else if (e.type === 'tank') {
    ctx.beginPath();
    ctx.moveTo(x, y + h / 2);
    ctx.lineTo(x - w / 2, y + h / 4);
    ctx.lineTo(x - w / 2, y - h / 4);
    ctx.lineTo(x - w / 4, y - h / 2);
    ctx.lineTo(x + w / 4, y - h / 2);
    ctx.lineTo(x + w / 2, y - h / 4);
    ctx.lineTo(x + w / 2, y + h / 4);
    ctx.closePath();
    ctx.fill();
  } else if (e.type === 'fast') {
    ctx.beginPath();
    ctx.moveTo(x, y + h / 2);
    ctx.lineTo(x - w / 2, y - h / 2);
    ctx.lineTo(x, y);
    ctx.lineTo(x + w / 2, y - h / 2);
    ctx.closePath();
    ctx.fill();
  }
}

function drawBoss(e) {
  const x = e.x, y = e.y, w = e.w, h = e.h;
  ctx.fillStyle = e.hitFlash > 0 ? '#fff' : e.color;

  // Main body
  ctx.beginPath();
  ctx.moveTo(x, y + h / 2);
  ctx.lineTo(x - w / 2, y + h / 4);
  ctx.lineTo(x - w * 0.7, y);
  ctx.lineTo(x - w / 2, y - h / 4);
  ctx.lineTo(x - w / 4, y - h / 2);
  ctx.lineTo(x + w / 4, y - h / 2);
  ctx.lineTo(x + w / 2, y - h / 4);
  ctx.lineTo(x + w * 0.7, y);
  ctx.lineTo(x + w / 2, y + h / 4);
  ctx.closePath();
  ctx.fill();

  // Core
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.beginPath();
  ctx.arc(x, y, w / 6, 0, Math.PI * 2);
  ctx.fill();

  // Side cannons
  ctx.fillStyle = e.hitFlash > 0 ? '#fff' : '#c0f';
  ctx.fillRect(x - w * 0.65 - 6, y - 4, 12, 8);
  ctx.fillRect(x + w * 0.65 - 6, y - 4, 12, 8);
}

// ─── COLLISION ────────────────────────────────────────────────────────────────
function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax - aw / 2 < bx + bw / 2 &&
         ax + aw / 2 > bx - bw / 2 &&
         ay - ah / 2 < by + bh / 2 &&
         ay + ah / 2 > by - bh / 2;
}

function checkCollisions() {
  // Missile AOE explosion
  for (let bi = bullets.length - 1; bi >= 0; bi--) {
    const b = bullets[bi];
    if (b.type !== 'missile') continue;
    let hit = false;
    for (let ei = enemies.length - 1; ei >= 0; ei--) {
      const e = enemies[ei];
      if (rectsOverlap(b.x, b.y, 40, 40, e.x, e.y, e.w, e.h)) {
        hit = true;
      }
    }
    // Missile hits top or enemy
    if (b.y < 10 || hit) {
      spawnParticles(b.x, b.y, '#f80', 20, 6);
      spawnParticles(b.x, b.y, '#ff0', 10, 4);
      shake(8);
      if (hit) {
        for (let ei = enemies.length - 1; ei >= 0; ei--) {
          const e = enemies[ei];
          if (rectsOverlap(b.x, b.y, 40, 40, e.x, e.y, e.w, e.h)) {
            e.hp -= 3;
            e.hitFlash = 10;
            if (e.hp <= 0) {
              score += e.pts * wave;
              spawnParticles(e.x, e.y, e.color, e.type === 'boss' ? 40 : 14, 5);
              shake(e.type === 'boss' ? 18 : 6);
              playSound('enemyDie');
              e.alive = false;
              enemiesLeft = Math.max(0, enemiesLeft - 1);
            }
          }
        }
      }
      bullets.splice(bi, 1);
      continue;
    }
  }

  // Player bullets vs enemies (non-missile)
  for (let bi = bullets.length - 1; bi >= 0; bi--) {
    const b = bullets[bi];
    if (b.type === 'missile') continue;
    let hit = false;
    for (let ei = enemies.length - 1; ei >= 0; ei--) {
      const e = enemies[ei];
      if (rectsOverlap(b.x, b.y, b.w, b.h, e.x, e.y, e.w, e.h)) {
        e.hp--;
        e.hitFlash = 6;
        hit = true;
        spawnParticles(b.x, b.y, '#0ff', 4, 2);
        if (e.hp <= 0) {
          score += e.pts * wave;
          spawnParticles(e.x, e.y, e.color, e.type === 'boss' ? 40 : 14, 5);
          shake(e.type === 'boss' ? 18 : 6);
          playSound('enemyDie');
          e.alive = false;
          enemiesLeft = Math.max(0, enemiesLeft - 1);
          // Chance to spawn powerup
          if (Math.random() < 0.15) spawnPowerup(e.x, e.y);
        }
        break;
      }
    }
    if (hit) bullets.splice(bi, 1);
  }

  // Powerup pickup
  for (let pi = powerups.length - 1; pi >= 0; pi--) {
    const p = powerups[pi];
    if (rectsOverlap(p.x, p.y, 20, 20, player.x, player.y, player.w * SCALE, player.h * SCALE)) {
      if (p.type === 'spread') {
        if (spreadLevel < 5) spreadLevel++;
        currentWeapon = 'spread';
        playSound('levelup');
      }
      if (p.type === 'laser') {
        laserLevel = Math.min(3, laserLevel + 1);
        laserEnergy = laserMax;
        currentWeapon = 'laser';
        playSound('levelup');
      }
      if (p.type === 'missile') {
        missileCount += 3;
        currentWeapon = 'missile';
        playSound('shoot');
      }
      if (p.type === 'radial') {
        radialLevel = Math.min(5, radialLevel + 1);
        hasRadial = true;
        currentWeapon = 'radial';
        playSound('levelup');
      }
      spawnParticles(p.x, p.y, '#fff', 10, 3);
      powerups.splice(pi, 1);
    } else if (p.y > H + 20) {
      powerups.splice(pi, 1);
    }
  }

  // Enemy bullets vs player
  if (player.invincible > 0) return;
  for (let bi = enemyBullets.length - 1; bi >= 0; bi--) {
    const b = enemyBullets[bi];
    if (rectsOverlap(b.x, b.y, 8, 8, player.x, player.y, player.w * SCALE * 0.7, player.h * SCALE * 0.7)) {
      enemyBullets.splice(bi, 1);
      hitPlayer();
    }
  }

  // Enemies vs player
  for (const e of enemies) {
    if (rectsOverlap(e.x, e.y, e.w * 0.8, e.h * 0.8, player.x, player.y, player.w * SCALE * 0.7, player.h * SCALE * 0.7)) {
      if (player.invincible <= 0) {
        e.hp -= 2;
        e.hitFlash = 10;
        if (e.hp <= 0) {
          score += e.pts;
          spawnParticles(e.x, e.y, e.color, 14, 5);
          e.alive = false;
          enemiesLeft = Math.max(0, enemiesLeft - 1);
        }
        hitPlayer();
      }
    }
  }
}

function hitPlayer() {
  player.lives--;
  player.invincible = 120;
  shake(15);
  playSound('playerHit');
  spawnParticles(player.x, player.y, '#f44', 18, 4);
  if (player.lives <= 0) {
    setTimeout(() => {
      state = 'gameover';
      if (score > highScore) {
        highScore = score;
        localStorage.setItem('starAssaultHigh', highScore);
      }
      playSound('gameover');
    }, 200);
  }
}

// ─── INPUT ────────────────────────────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (state === 'title' || state === 'gameover') {
    if (e.code === 'Space' || e.code === 'Enter') startGame();
  }
  if (state === 'playing') {
    if (e.code === 'Digit1') switchWeapon('normal');
    if (e.code === 'Digit2') switchWeapon('spread');
    if (e.code === 'Digit3') switchWeapon('laser');
    if (e.code === 'Digit4') switchWeapon('missile');
    if (e.code === 'Digit5') switchWeapon('radial');
  }
  e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// Touch controls
let touchLeft = false, touchRight = false, touchUp = false, touchDown = false, touchShoot = false;
let touchStartX = 0, touchStartY = 0;
let touchId = null;
let joystickX = 0, joystickY = 0;
let joystickActive = false;
let joystickOrigin = { x: 0, y: 0 };

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  initAudio();
  if (state === 'title' || state === 'gameover') { startGame(); return; }
  for (const t of e.changedTouches) {
    if (t.clientX < W * 0.5) {
      // Left half = joystick
      joystickActive = true;
      joystickOrigin.x = t.clientX;
      joystickOrigin.y = t.clientY;
      joystickX = 0; joystickY = 0;
      touchId = t.identifier;
    } else {
      // Right half = shoot
      touchShoot = true;
    }
  }
}, {passive: false});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier === touchId) {
      const dx = t.clientX - joystickOrigin.x;
      const dy = t.clientY - joystickOrigin.y;
      const maxR = 50;
      const dist = Math.sqrt(dx * dx + dy * dy);
      joystickX = dist > maxR ? dx / dist : dx / maxR;
      joystickY = dist > maxR ? dy / dist : dy / maxR;
    }
  }
}, {passive: false});

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier === touchId) {
      joystickActive = false;
      joystickX = 0; joystickY = 0;
      touchId = null;
    } else {
      touchShoot = false;
    }
  }
}, {passive: false});

// Click/tap to start
canvas.addEventListener('mousedown', () => { initAudio(); if (state !== 'playing') startGame(); });

// ─── UI ───────────────────────────────────────────────────────────────────────
function updateUI() {
  document.getElementById('scoreDisplay').innerHTML =
    'SCORE: ' + score +
    '&nbsp;S:<span style="color:#ff0">' + spreadLevel + '</span>' +
    '&nbsp;L:<span style="color:#0f8">' + laserLevel + '</span>' +
    '&nbsp;M:<span style="color:#f80">' + missileCount + '</span>' +
    '&nbsp;R:<span style="color:#f0f">' + radialLevel + '</span>';
  document.getElementById('waveDisplay').textContent =
    bossSpawned ? '⚠️ BOSS ⚠️' : 'WAVE ' + wave;
  const hbar = document.getElementById('healthBar');
  hbar.innerHTML = '';
  for (let i = 0; i < player.maxLives; i++) {
    const span = document.createElement('span');
    span.className = 'heart';
    span.textContent = i < player.lives ? '♥' : '♡';
    span.style.color = i < player.lives ? '#f44' : '#444';
    hbar.appendChild(span);
  }
}

// ─── TITLE / GAMEOVER SCREENS ─────────────────────────────────────────────────
let titleAnim = 0;
function drawTitle() {
  titleAnim += 0.03;
  ctx.save();
  // Title glow
  const y0 = H * 0.3;
  ctx.shadowBlur = 30;
  ctx.shadowColor = '#0ff';
  ctx.fillStyle = '#0ff';
  ctx.font = `bold ${Math.round(38 * SCALE)}px 'Courier New', monospace`;
  ctx.textAlign = 'center';
  ctx.fillText('STAR ASSAULT', W / 2, y0);

  ctx.shadowBlur = 0;
  ctx.fillStyle = '#aef';
  ctx.font = `${Math.round(14 * SCALE)}px 'Courier New', monospace`;
  ctx.fillText('WASD / Arrow Keys — Move', W / 2, y0 + 40 * SCALE);
  ctx.fillText('Space — Fire  |  Touch: Left=Move, Right=Fire', W / 2, y0 + 60 * SCALE);

  const blink = Math.sin(titleAnim * 3) > 0;
  if (blink) {
    ctx.fillStyle = '#ff0';
    ctx.shadowBlur = 15;
    ctx.shadowColor = '#ff0';
    ctx.font = `bold ${Math.round(16 * SCALE)}px 'Courier New', monospace`;
    ctx.fillText('[ TAP / PRESS SPACE TO START ]', W / 2, H * 0.65);
  }

  ctx.fillStyle = '#666';
  ctx.font = `${Math.round(11 * SCALE)}px 'Courier New', monospace`;
  ctx.fillText(`HIGH SCORE: ${highScore}`, W / 2, H * 0.78);
  ctx.restore();
}

function drawGameOver() {
  ctx.save();
  ctx.shadowBlur = 25;
  ctx.shadowColor = '#f44';
  ctx.fillStyle = '#f44';
  ctx.font = `bold ${Math.round(36 * SCALE)}px 'Courier New', monospace`;
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', W / 2, H * 0.35);

  ctx.shadowBlur = 0;
  ctx.fillStyle = '#fff';
  ctx.font = `${Math.round(18 * SCALE)}px 'Courier New', monospace`;
  ctx.fillText('SCORE: ' + score, W / 2, H * 0.47);
  ctx.fillText('WAVE: ' + wave, W / 2, H * 0.54);

  ctx.fillStyle = '#ff0';
  ctx.font = `${Math.round(13 * SCALE)}px 'Courier New', monospace`;
  ctx.fillText('HIGH SCORE: ' + highScore, W / 2, H * 0.62);

  const blink = Math.sin(Date.now() * 0.004) > 0;
  if (blink) {
    ctx.fillStyle = '#0ff';
    ctx.shadowBlur = 12;
    ctx.shadowColor = '#0ff';
    ctx.font = `bold ${Math.round(14 * SCALE)}px 'Courier New', monospace`;
    ctx.fillText('[ TAP / PRESS SPACE TO RETRY ]', W / 2, H * 0.73);
  }
  ctx.restore();
}

function drawWaveTransition() {
  if (waveTransition <= 0) return;
  waveTransition--;
  const alpha = Math.min(1, waveTransition / 30);
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = '#ff0';
  ctx.shadowBlur = 20;
  ctx.shadowColor = '#ff0';
  ctx.font = `bold ${Math.round(28 * SCALE)}px 'Courier New', monospace`;
  ctx.textAlign = 'center';
  ctx.fillText(bossSpawned ? '⚠️  BOSS INCOMING  ⚠️' : `WAVE ${wave}`, W / 2, H / 2);
  ctx.restore();
}

// ─── GAME LOOP ────────────────────────────────────────────────────────────────
function startGame() {
  score = 0;
  wave = 1;
  enemies.length = 0;
  bullets.length = 0;
  enemyBullets.length = 0;
  particles.length = 0;
  powerups.length = 0;
  player.lives = 3;
  player.maxLives = 3;
  currentWeapon = 'normal';
  laserEnergy = laserMax;
  missileCount = 0;
  spreadPickups = 0;
  spreadLevel = 0;
  laserLevel = 0;
  radialLevel = 0;
  hasRadial = false;
  resetPlayer();
  spawnWave();
  waveTransition = 90;
  state = 'playing';
}

let lastTime = 0;
function gameLoop(timestamp) {
  requestAnimationFrame(gameLoop);
  const dt = Math.min(timestamp - lastTime, 50);
  lastTime = timestamp;

  ctx.save();
  applyShake();

  drawStars();

  if (state === 'title') {
    drawTitle();
    // Animate some enemies in background
    ctx.restore();
    return;
  }

  if (state === 'gameover') {
    drawGameOver();
    ctx.restore();
    return;
  }

  // ── Playing ──
  // Player movement
  const spd = 4.5 * SCALE;
  let dx = 0, dy = 0;
  if (keys['ArrowLeft'] || keys['KeyA']) dx -= 1;
  if (keys['ArrowRight'] || keys['KeyD']) dx += 1;
  if (keys['ArrowUp'] || keys['KeyW']) dy -= 1;
  if (keys['ArrowDown'] || keys['KeyS']) dy += 1;
  if (joystickActive) { dx += joystickX; dy += joystickY; }
  const len = Math.sqrt(dx * dx + dy * dy);
  if (len > 0) { dx /= len; dy /= len; }
  player.x = Math.max(16 * SCALE, Math.min(W - 16 * SCALE, player.x + dx * spd));
  player.y = Math.max(20 * SCALE, Math.min(H - 20 * SCALE, player.y + dy * spd));

  // Auto-shoot or key/touch shoot
  const doShoot = keys['Space'] || keys['KeyZ'] || touchShoot || autoShoot;
  if (doShoot) shoot();
  if (player.shootCooldown > 0) player.shootCooldown--;
  if (player.invincible > 0) player.invincible--;

  // Move bullets
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += (b.vx || 0);
    b.y += b.vy;
    if (b.y < -20 || b.x < -20 || b.x > W + 20) bullets.splice(i, 1);
  }
  for (let i = enemyBullets.length - 1; i >= 0; i--) {
    const b = enemyBullets[i];
    b.x += b.vx; b.y += b.vy;
    if (b.y > H + 20 || b.y < -20 || b.x < -20 || b.x > W + 20) enemyBullets.splice(i, 1);
  }

  updateEnemies();
  checkCollisions();
  updateParticles();
  updatePowerups();

  // Check wave clear
  if (enemies.length === 0 && spawnCount >= waveTotal && enemiesLeft <= 0) {
    wave++;
    enemies.length = 0;
    bullets.length = 0;
    enemyBullets.length = 0;
    spawnWave();
    waveTransition = 120;
    playSound('levelup');
    player.lives = Math.min(player.lives + 1, player.maxLives);
  }

  // Draw everything
  drawParticles();
  drawPowerups();
  drawEnemies();
  // Laser beam visual
  if (currentWeapon === 'laser' && laserEnergy > 0) {
    ctx.save();
    ctx.shadowBlur = 25;
    ctx.shadowColor = '#0f8';
    const grad = ctx.createLinearGradient(player.x, player.y - 16 * SCALE, player.x, 0);
    grad.addColorStop(0, 'rgba(0,255,128,0.8)');
    grad.addColorStop(1, 'rgba(0,255,128,0)');
    ctx.strokeStyle = grad;
    ctx.lineWidth = 4 + laserLevel * 3;
    ctx.beginPath();
    ctx.moveTo(player.x, player.y - 16 * SCALE);
    ctx.lineTo(player.x, 0);
    ctx.stroke();
    ctx.strokeStyle = 'rgba(255,255,255,0.6)';
    ctx.lineWidth = 2 + laserLevel;
    ctx.beginPath();
    ctx.moveTo(player.x, player.y - 16 * SCALE);
    ctx.lineTo(player.x, 0);
    ctx.stroke();
    ctx.restore();
  }

  drawBullets();
  drawPlayer();
  drawWaveTransition();

  // Touch joystick visual
  if (joystickActive) {
    const jx = joystickOrigin.x, jy = joystickOrigin.y;
    ctx.save();
    ctx.globalAlpha = 0.3;
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(jx, jy, 40, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 0.6;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(jx + joystickX * 40, jy + joystickY * 40, 14, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  updateUI();
  ctx.restore();
}

// Auto-shoot when no keys pressed (mobile convenience)
let autoShoot = false;
// On mobile, always shoot
const isMobile = /Mobi|Android|Touch/i.test(navigator.userAgent) || ('ontouchstart' in window);
if (isMobile) autoShoot = true;

requestAnimationFrame(gameLoop);
</script>
